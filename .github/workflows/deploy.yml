name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # Change to 'master' if that's your default branch
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: node scripts/build-gh-pages.js

      - name: Verify 404.html exists in build output
        run: |
          if [ -f "dist/MMM/browser/404.html" ]; then
            echo "✓ 404.html found in build output"
          else
            echo "Error: 404.html not found in build output"
            exit 1
          fi

      - name: Promote CSR index to default index
        run: |
          # When Angular builds with ssr=false + outputMode=static, it may produce
          # index.csr.html (the real app) alongside a template index.html (redirect).
          # GitHub Pages serves index.html at root — promote the real app so it boots.
          if [ -f "dist/MMM/browser/index.csr.html" ]; then
            echo "Promoting index.csr.html → index.html"
            cp dist/MMM/browser/index.csr.html dist/MMM/browser/index.html
          fi
          echo "index.html size: $(wc -c < dist/MMM/browser/index.html) bytes"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist/MMM/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
