name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # Change to 'master' if that's your default branch
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate manifest
        run: npm run generate:manifest

      - name: Build for GitHub Pages
        run: npm run build:gh-pages

      - name: Create 404.html from built index
        run: |
          BASE_PATH=$(node -p "(() => { const u = new URL(require('./project.config.json').projectUrl); const p = u.pathname.replace(/\\/$/, ''); return p + '/'; })()")
          # Find the built index file (could be index.csr.html or index.html)
          if [ -f "dist/MMM/browser/index.csr.html" ]; then
            INDEX_FILE="dist/MMM/browser/index.csr.html"
          elif [ -f "dist/MMM/browser/index.html" ]; then
            INDEX_FILE="dist/MMM/browser/index.html"
          else
            echo "Error: No index file found"
            exit 1
          fi
          # Copy to 404.html and ensure base href matches GitHub Pages path
          cp "$INDEX_FILE" dist/MMM/browser/404.html
          sed -i "s|<base href=\"/\">|<base href=\"${BASE_PATH}\">|g" dist/MMM/browser/404.html
          sed -i "s|<base href=\"\">|<base href=\"${BASE_PATH}\">|g" dist/MMM/browser/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist/MMM/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
